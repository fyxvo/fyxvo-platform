name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"
  CI: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Bootstrap workspace toolchain
        env:
          FYXVO_BOOTSTRAP_SKIP_WORKSPACE_INSTALL: "1"
        run: bash ./scripts/bootstrap.sh

      - name: Persist Solana and Rust paths
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Create Anchor wallet
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase --force -o "$HOME/.config/solana/id.json"

      - name: Verify lockfile install
        run: pnpm ci:install

      - name: Secrets scan
        run: |
          # Scan for potential secrets
          found=0

          # Check for private key patterns
          if git diff --name-only HEAD~1..HEAD 2>/dev/null | xargs -I{} grep -lE "(PRIVATE_KEY|SECRET_KEY|MNEMONIC)\s*=\s*['\"][a-zA-Z0-9+/]{40,}['\"]" {} 2>/dev/null | grep -v ".env.example" | grep -v "test/"; then
            echo "::error::Potential private key found in committed files"
            found=1
          fi

          # Check for long base58 strings that could be wallet keys (longer than 80 chars)
          if git diff --name-only HEAD~1..HEAD 2>/dev/null | xargs -I{} grep -lE "[1-9A-HJ-NP-Za-km-z]{80,}" {} 2>/dev/null | grep -v ".env.example" | grep -v "test/" | grep -v ".md"; then
            echo "::warning::Long base58-like string found — verify this is not a private key"
          fi

          if [ $found -eq 1 ]; then
            exit 1
          fi
          echo "Secrets scan passed"

      - name: Lint
        run: pnpm exec turbo run lint --filter=@fyxvo/web

      - name: Type check
        run: pnpm typecheck

      - name: Run workspace tests
        run: pnpm test

      - name: Run Anchor tests
        run: pnpm test:anchor

      - name: Build
        run: pnpm build

      - name: Report frontend performance budgets
        run: pnpm --filter @fyxvo/web perf:budgets

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Check API health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://api.fyxvo.com/health)
          echo "API health: $status"
          [ "$status" = "200" ] || echo "WARNING: API health returned $status"
      - name: Check gateway health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://rpc.fyxvo.com/health)
          echo "Gateway health: $status"
          [ "$status" = "200" ] || echo "WARNING: Gateway health returned $status"
      - name: Check frontend
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://www.fyxvo.com)
          echo "Frontend: $status"
          [ "$status" = "200" ] || echo "WARNING: Frontend returned $status"
      - name: Check network stats
        run: |
          resp=$(curl -s https://api.fyxvo.com/v1/network/stats)
          echo "Network stats: $resp"
          echo "$resp" | grep -q '"totalRequests"' || echo "WARNING: network stats response unexpected"
