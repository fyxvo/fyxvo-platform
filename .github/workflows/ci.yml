name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"
  CI: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Bootstrap workspace toolchain
        env:
          FYXVO_BOOTSTRAP_SKIP_WORKSPACE_INSTALL: "1"
        run: bash ./scripts/bootstrap.sh

      - name: Persist Solana and Rust paths
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Create Anchor wallet
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase --force -o "$HOME/.config/solana/id.json"

      - name: Verify lockfile install
        run: pnpm ci:install

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run workspace tests
        run: pnpm test

      - name: Run Anchor tests
        run: pnpm test:anchor

      - name: Build
        run: pnpm build
